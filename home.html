<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="music-player/player.css">
</head>
<body>

  <!-- 🌌 SKY BACKGROUND -->
  <div class="sky">
    <div class="stars layer1"></div>
    <div class="stars layer2"></div>
    <div class="stars layer3"></div>
    <div class="nebula"></div>
    <div class="dust"></div>
    <div class="shooting-container"></div>
  </div>

  <div class="sidebar">

    <!-- ✅ INPUT TÁCH RIÊNG -->
    <input type="checkbox" id="toggleSidebar">

    <!-- 🔘 NÚT -->
    <label class="burger" for="toggleSidebar">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <!-- 📦 CONTENT -->
    <div class="sidebar-content">
      <h3>Tags</h3>
      <div id="tagFilter" class="tag-list"></div>
    </div>

  </div>

  <!-- 📦 MAIN -->
  <div class="main-content">

    <!-- 🔍 SEARCH -->
    <input type="text" id="searchBox" placeholder="Tìm nhân vật hoặc tag...">

    <header>
      <h2>🔥 Character AI</h2>
    </header>

    <!-- 📋 LIST -->
    <div id="list" class="grid"></div>

  </div>

  <!-- Scripts -->
  <script src="app.js"></script>
  <script src="script.js"></script>
  <script src="music-player/loadPlayer.js"></script>

</body>
</html>
