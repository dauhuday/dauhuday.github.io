<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro</title>

  <link rel="stylesheet" href="style.css?v=1.3">
  <link rel="stylesheet" href="music-player/player.css">
</head>

<body class="intro">

  <!-- 🎧 MUSIC PLAYER (NHÚNG TRỰC TIẾP) -->
  <div class="music-player">
    <button id="playBtn">▶</button>
    <div class="music-info">
      <div class="bar"></div>
    </div>
  </div>

  <audio id="bgMusic" loop>
    <source src="music/doi-mat-ke-tinh-si.mp3" type="audio/mpeg">
  </audio>

  <!-- 🌌 SKY BACKGROUND -->
  <div class="sky">

    <div class="stars layer1"></div>
    <div class="stars layer2"></div>
    <div class="stars layer3"></div>

    <div class="nebula"></div>
    <div class="dust"></div>

    <div class="shooting-container"></div>
  </div>

  <!-- ✨ CONTENT -->
  <div class="intro-container">
    <h1 class="logo">
    <span class="big">Đậu</span>
    <span class="small">trong</span>
    <span class="big">Đậu Hủ</span>
  </h1>

  <p class="subtitle">Hôm nay bạn đã ăn đậu hủ chưa?</p>

<div class="menu-buttons">

  <a href="home.html" class="fancy btn1">
    <span class="top-key"></span>
    <span class="text">Order</span>
    <span class="bottom-key-1"></span>
    <span class="bottom-key-2"></span>
  </a>

  <a href="#" class="fancy btn2">
    <span class="top-key"></span>
    <span class="text">Fanpage</span>
    <span class="bottom-key-1"></span>
    <span class="bottom-key-2"></span>
  </a>

  <a href="#" class="fancy btn3">
    <span class="top-key"></span>
    <span class="text">Yapping</span>
    <span class="bottom-key-1"></span>
    <span class="bottom-key-2"></span>
  </a>

  <a href="#" class="fancy btn4">
    <span class="top-key"></span>
    <span class="text">Discord</span>
    <span class="bottom-key-1"></span>
    <span class="bottom-key-2"></span>
  </a>

</div>
</div>

  <!-- SCRIPT -->
  <script src="script.js"></script>
  <script src="music-player/player.js"></script>

</body>
</html>
